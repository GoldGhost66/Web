<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot AI</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <section class="app__hero">
      <h1>Chatbot AI</h1>
      <p>Chat thông minh với AI</p>
    </section>

    <section class="chatcard">
      <div class="chatcard__status">
        <span id="status">Đã sẵn sàng</span>
      </div>

      <div id="chat" class="chat-window"></div>

      <div class="input-bar">
        <input id="msg" placeholder="Nhập tin nhắn..." />
        <button id="sendBtn">Gửi</button>
      </div>
    </section>
  </div>

<script>
const apiBase = "https://web-ai-qdr5.onrender.com"; // link backend Render

const chatDiv = document.getElementById("chat");
const msgInput = document.getElementById("msg");
const statusEl = document.getElementById("status");

function setStatus(t){ statusEl.innerText = t; }

function addMsg(text, sender){
  const wrapper = document.createElement("div");
  wrapper.className = "message " + sender;
  const bubble = document.createElement("div");
  bubble.className = "message__bubble";
  bubble.innerText = text;
  wrapper.appendChild(bubble);
  chatDiv.appendChild(wrapper);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

document.getElementById("sendBtn").onclick = sendMsg;

async function sendMsg(){
  const msg = msgInput.value;
  if(!msg) return;

  addMsg(msg,"user");
  msgInput.value="";
  setStatus("AI đang trả lời...");

  const res = await fetch(apiBase + "/chat-stream",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: msg })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let result="";

  while(true){
    const {done,value} = await reader.read();
    if(done) break;
    const chunk = decoder.decode(value);
    const lines = chunk.split("\n");
    for(let line of lines){
      if(line.startsWith("data:")){
        let data = line.replace("data:","").trim();
        if(data==="[DONE]") break;
        result += JSON.parse(data);
      }
    }
  }

  addMsg(result,"ai");
  setStatus("Xong");
}
</script>
</body>
</html>
